name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black

      - name: Lint (ruff)
        run: ruff check src/ scripts/ tests/

      - name: Format check (black)
        run: black --check src/ scripts/ tests/

      - name: Verify every module imports cleanly
        run: |
          python -c "from src import analysis, config, plotting, preprocessing, statistics, utils, visualization; print('all src modules imported OK')"

      - name: Run tests (no raw data required)
        run: pytest tests/ -v
